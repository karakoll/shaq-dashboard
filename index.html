// ── MBO: PAYOUT LOGIC (replica delle schede) ──────────────────
// tier sul singolo obiettivo in base al % raggiungimento
function mboTier(pct){
  if(pct>=100)return 1;
  if(pct>=75) return 0.75;
  if(pct>=50) return 0.5;
  return 0;
}
function mboTierLabel(pct){
  if(pct>=100)return['Target','tier-100'];
  if(pct>=75) return['Intermediate','tier-75'];
  if(pct>=50) return['Minimum','tier-50'];
  return['—','tier-0'];
}
// quota EBITDA del bonus teorico (E25/E26 nelle schede)
function mboEbitdaFactor(card){
  if(card.ebitda_effettivo==null||card.ebitda_target<=0)return null; // non calcolabile finché non inserito
  const ratio=card.ebitda_effettivo/card.ebitda_target; // es. 1.05
  if(card.payout_model==='binario'){
    // <80%=0, 80-90%=50%, 90-100% proporzionale, >100% pieno
    if(ratio<0.80)return 0;
    if(ratio<=0.90)return 0.5;
    if(ratio<=1.00)return ratio;
    return 1;
  } else {
    // proporzionale: <gate=0, gate..120% proporzionale, >120% cap 120%
    if(ratio<card.gate_pct)return 0;
    return Math.min(ratio,1.20);
  }
}
// € erogabile totale della scheda
function mboComputeCard(card){
  const objs=mboObjectives.filter(o=>o.card_id===card.id);
  const f=mboEbitdaFactor(card);                 // null se EBITDA non inserito
  const factor=(f==null)?1:f;                    // per anteprima "al lordo gate" usiamo 1
  const theoretical=card.target_bonus*factor;    // bonus teorico erogabile (post-EBITDA)
  let total=0;
  const rows=objs.map(o=>{
    const eur=theoretical*Number(o.weight)*mboTier(mboObjPct(o));
    total+=eur;
    return {obj:o,eur};
  });
  return {objs,factor:f,theoretical,total,rows};
}

// ── MBO: RENDER ───────────────────────────────────────────────
function renderMBO(){
  if(!canViewMbo())return;
  const yearSel=document.getElementById('mbo-year-filter').value;
  const personSel=document.getElementById('mbo-person-filter').value;
  const list=document.getElementById('mbo-list');
  let cards=mboCards.filter(c=>String(c.year)===String(yearSel));
  if(personSel!=='all')cards=cards.filter(c=>String(c.person_id)===String(personSel));
  cards.sort((a,b)=>{
    const pa=mboPeople.find(p=>p.id===a.person_id)?.sort_order||0;
    const pb=mboPeople.find(p=>p.id===b.person_id)?.sort_order||0;
    return pa-pb;
  });
  if(cards.length===0){list.innerHTML='<div class="mbo-empty">Nessun MBO per i filtri selezionati.</div>';return}
  list.innerHTML=cards.map(renderMBOCard).join('');
}

function renderMBOCard(card){
  const ed=canEditMbo();
  const person=mboPeople.find(p=>p.id===card.person_id);
  const name=person?person.full_name:'—';
  const initial=name.charAt(0).toUpperCase();
  const comp=mboComputeCard(card);
  const fmtEur=v=>'€ '+Math.round(v).toLocaleString('it-IT');

  // gate status
  let gateStatus='', gateCls='';
  if(card.ebitda_effettivo==null){
    gateStatus='Inserisci l\'EBITDA effettivo per calcolare il bonus.';gateCls='warn';
  } else {
    const ratio=card.ebitda_target>0?card.ebitda_effettivo/card.ebitda_target:0;
    const pctTxt=(ratio*100).toFixed(1)+'%';
    if(comp.factor===0){gateStatus=`EBITDA ${pctTxt} del target — sotto il gate: nessun incentivo erogabile.`;gateCls='fail';}
    else if(card.payout_model==='binario'&&ratio<=0.90){gateStatus=`EBITDA ${pctTxt} (fascia 80-90%): bonus teorico ridotto al 50%.`;gateCls='warn';}
    else {gateStatus=`EBITDA ${pctTxt} del target — gate superato. Fattore applicato: ${(comp.factor*100).toFixed(0)}%.`;gateCls='pass';}
  }

  const bonusCls = comp.factor===0?'zero':(card.ebitda_effettivo!=null?'ok':'');
  const bonusVal = card.ebitda_effettivo==null ? '—' : fmtEur(comp.total);

  const objsHtml=comp.rows.map(r=>renderMBOObjective(r.obj,r.eur,card)).join('');

  const gateRO = card.payout_model==='binario'
    ? `< 80% = 0 · 80-90% = 50% · 90-100% prop. · > 100% pieno`
    : `< gate = 0 · gate-120% proporzionale · cap 120%`;

  return `
  <div class="mbo-card" data-card="${card.id}">
    <div class="mbo-card-head">
      <div class="mbo-avatar">${initial}</div>
      <div class="mbo-who">
        <div class="mbo-name">${escHtml(name)}</div>
        <div class="mbo-rolelbl">${escHtml(person?.role_label||'')} · ${card.year} · modello ${card.payout_model}</div>
      </div>
      <div class="mbo-bonus-box">
        <div class="lbl">Bonus stimato</div>
        <div class="val ${bonusCls}">${bonusVal}</div>
        <div class="sub">target ${fmtEur(card.target_bonus)}</div>
      </div>
    </div>
    <div class="mbo-gate">
      <div class="field">
        <label>EBITDA target (€)</label>
        ${ed?`<input type="number" value="${card.ebitda_target}" onchange="updateCardField(${card.id},'ebitda_target',this.value)" />`
            :`<div class="ro">€ ${Number(card.ebitda_target).toLocaleString('it-IT')}</div>`}
      </div>
      <div class="field">
        <label>EBITDA effettivo (€)</label>
        ${ed?`<input type="number" value="${card.ebitda_effettivo==null?'':card.ebitda_effettivo}" placeholder="non inserito" onchange="updateCardField(${card.id},'ebitda_effettivo',this.value)" />`
            :`<div class="ro">${card.ebitda_effettivo==null?'<span style="color:var(--text3)">non inserito</span>':'€ '+Number(card.ebitda_effettivo).toLocaleString('it-IT')}</div>`}
      </div>
      <div class="field">
        <label>Gate minimo (%)</label>
        ${ed?`<input type="number" step="1" value="${Math.round(card.gate_pct*100)}" onchange="updateCardField(${card.id},'gate_pct',this.value/100)" />`
            :`<div class="ro">${Math.round(card.gate_pct*100)}%</div>`}
      </div>
      <div class="field">
        <label>Bonus target (€)</label>
        ${ed?`<input type="number" value="${card.target_bonus}" onchange="updateCardField(${card.id},'target_bonus',this.value)" />`
            :`<div class="ro">€ ${Number(card.target_bonus).toLocaleString('it-IT')}</div>`}
      </div>
      <div class="field">
        <label>Regola erogazione</label>
        <div class="ro" style="font-size:11px">${gateRO}</div>
      </div>
      <div class="mbo-gate-status ${gateCls}">${gateStatus}</div>
    </div>
    <div class="mbo-objs">
      ${objsHtml||'<div style="font-size:12px;color:var(--text3);padding:8px 0">Nessun obiettivo.</div>'}
    </div>
  </div>`;
}

// % automatica di un obiettivo = media dei (valore/target) dei suoi sotto-obiettivi
function mboAutoPct(objId){
  const subs=mboSubs.filter(s=>s.objective_id===objId);
  if(!subs.length)return 0;
  let sum=0;
  subs.forEach(s=>{ const r=s.target_value>0?Math.min(1,s.current_value/s.target_value):0; sum+=r; });
  return Math.round(sum/subs.length*100);
}
// % effettiva mostrata/usata: manuale se sovrascritta, altrimenti automatica
function mboObjPct(obj){
  return obj.manual_pct ? (obj.achievement_pct||0) : mboAutoPct(obj.id);
}
// timeline: posizione di "oggi" tra 1 gen dell'anno e la scadenza piu lontana dei sotto-obiettivi
function mboTimeline(obj,year){
  const subs=mboSubs.filter(s=>s.objective_id===obj.id&&s.due_date);
  if(!subs.length)return null;
  const start=new Date(year+'-01-01');
  let end=start;
  subs.forEach(s=>{const d=new Date(s.due_date); if(d>end)end=d;});
  if(end<=start)return null;
  const now=new Date();
  let todayPct=(now-start)/(end-start)*100;
  todayPct=Math.max(0,Math.min(100,todayPct));
  return {todayPct,endDate:end};
}

function renderMBOObjective(obj,eur,card){
  const ed=canEditMbo();
  const pct=mboObjPct(obj);
  const isManual=!!obj.manual_pct;
  const[tierLbl,tierCls]=mboTierLabel(pct);
  const fmtEur=v=>'€ '+Math.round(v).toLocaleString('it-IT');
  const subs=mboSubs.filter(s=>s.objective_id===obj.id);
  const open=mboExpandedObj[obj.id];
  const linkedProj=obj.project_id?allProjects.find(p=>p.id===obj.project_id):null;

  // dropdown progetti (collegamento da dashboard)
  const projOptions='<option value="">— nessun progetto —</option>'+
    allProjects.map(p=>`<option value="${p.id}" ${obj.project_id===p.id?'selected':''}>${escHtml(p.title)}</option>`).join('');

  const subsHtml=subs.map(s=>{
    const subPct=s.target_value>0?Math.min(999,Math.round(s.current_value/s.target_value*100)):0;
    const isDone=s.unit==='fatto';
    const editing=mboEditingSub===s.id;
    if(editing&&ed){
      return `
      <div class="mbo-sub-item mbo-sub-edit" onclick="event.stopPropagation()">
        <input type="text" id="edsub-t-${s.id}" value="${escHtml(s.title)}" placeholder="Sotto-obiettivo..." style="flex:2;min-width:120px;font-size:11px;padding:4px 6px;border:1px solid var(--border2);border-radius:4px;font-family:inherit" />
        <input type="number" id="edsub-tg-${s.id}" value="${s.target_value}" placeholder="target" style="width:60px;font-size:11px;padding:4px 6px;border:1px solid var(--border2);border-radius:4px;font-family:inherit" />
        <input type="text" id="edsub-u-${s.id}" value="${escHtml(s.unit||'')}" placeholder="unità" style="width:60px;font-size:11px;padding:4px 6px;border:1px solid var(--border2);border-radius:4px;font-family:inherit" />
        <input type="date" id="edsub-d-${s.id}" value="${s.due_date||''}" style="font-size:11px;padding:3px 5px;border:1px solid var(--border2);border-radius:4px;font-family:inherit" />
        <button class="mbo-sub-btn ok" onclick="saveEditSub(${s.id})" title="Salva">✓</button>
        <button class="mbo-sub-btn" onclick="cancelEditSub()" title="Annulla">✕</button>
      </div>`;
    }
    let valField;
    if(ed){
      valField=isDone
        ? `<select onchange="updateSubField(${s.id},'current_value',this.value)" style="font-size:11px;padding:3px 5px;border:1px solid var(--border2);border-radius:4px">
             <option value="0" ${Number(s.current_value)?'':'selected'}>Da fare</option>
             <option value="1" ${Number(s.current_value)?'selected':''}>Fatto</option>
           </select>`
        : `<input type="number" value="${s.current_value}" onchange="updateSubField(${s.id},'current_value',this.value)" />
           <span class="tg">/ ${s.target_value}${s.unit?' '+escHtml(s.unit):''}</span>`;
    }else{
      valField=isDone
        ? `<span class="ro">${Number(s.current_value)?'Fatto':'Da fare'}</span>`
        : `<span class="ro">${s.current_value}</span><span class="tg">/ ${s.target_value}${s.unit?' '+escHtml(s.unit):''}</span>`;
    }
    return `
      <div class="mbo-sub-item">
        <div class="nm">${escHtml(s.title)}${!isDone?` <span style="color:var(--text3)">(${subPct}%)</span>`:''}</div>
        <div class="vals">${valField}</div>
        <div class="dd">${formatDate(s.due_date)}</div>
        ${ed?`<button class="mbo-sub-btn" onclick="event.stopPropagation();startEditSub(${s.id})" title="Modifica">✎</button>
        <button class="mbo-sub-btn del" onclick="event.stopPropagation();deleteSubObjective(${s.id})" title="Elimina">🗑</button>`:''}
      </div>`;
  }).join('');

  // timeline avanzamento vs tempo
  const tl=mboTimeline(obj,card.year);
  let timelineHtml='';
  if(tl){
    const delta=pct-tl.todayPct;
    let stCls,stTxt;
    if(delta>=5){stCls='tl-ahead';stTxt='In anticipo';}
    else if(delta<=-5){stCls='tl-behind';stTxt='In ritardo';}
    else{stCls='tl-ontrack';stTxt='In linea';}
    const fillColor=delta>=5?'var(--green)':delta<=-5?'var(--red)':'var(--blue)';
    timelineHtml=`
      <div class="mbo-timeline">
        <div class="tl-bar">
          <div class="tl-fill" style="width:${Math.min(100,pct)}%;background:${fillColor}"></div>
          <div class="tl-today" style="left:${tl.todayPct}%"></div>
        </div>
        <div class="tl-legend">
          <span>1 gen ${card.year}</span>
          <span class="tl-status ${stCls}">${stTxt} · ${pct}% vs ${Math.round(tl.todayPct)}% atteso</span>
          <span>scad. ${formatDate(tl.endDate)}</span>
        </div>
      </div>`;
  }

  return `
  <div class="mbo-obj">
    <div class="mbo-obj-head" onclick="toggleMboObj(${obj.id})">
      <div class="mbo-obj-num">${obj.obj_number}</div>
      <div class="mbo-obj-title">${escHtml(obj.title)}${linkedProj?` <a class="lnk" href="#" onclick="event.stopPropagation();goToProject(${linkedProj.id})" style="font-size:11px;color:var(--accent)">↗ ${escHtml(linkedProj.title)}</a>`:''}</div>
      <div class="mbo-obj-weight">peso ${Math.round(obj.weight*100)}%</div>
      <span class="tier ${tierCls}">${tierLbl}</span>
      <div class="mbo-obj-eur">${card.ebitda_effettivo==null?'—':fmtEur(eur)}</div>
    </div>
    <div class="mbo-obj-prog">
      <span style="font-size:11px;color:var(--text3)">Raggiung.</span>
      ${ed?`<input class="pctin ${isManual?'':'auto'}" type="number" min="0" value="${pct}" onchange="updateObjPct(${obj.id},this.value)" title="${isManual?'Valore manuale':'Calcolato dai sotto-obiettivi'}" />`
          :`<span class="ro" style="font-weight:700">${pct}</span>`}
      <span style="font-size:11px;color:var(--text3)">%</span>
      ${ed?`<span class="mbo-auto-badge ${isManual?'man':''}" onclick="event.stopPropagation();toggleObjManual(${obj.id})" title="${isManual?'Torna al calcolo automatico':'Blocca su valore manuale'}">${isManual?'manuale':'auto'}</span>`
          :`<span class="mbo-auto-badge ${isManual?'man':''}" style="cursor:default">${isManual?'manuale':'auto'}</span>`}
    </div>
    ${timelineHtml}
    <div class="mbo-sub ${open?'open':''}" id="mbo-sub-${obj.id}">
      <div style="display:flex;align-items:center;gap:8px;margin:4px 0 8px;font-size:11px">
        <span style="color:var(--text3)">Progetto collegato:</span>
        ${ed?`<select onchange="linkObjProject(${obj.id},this.value)" onclick="event.stopPropagation()" style="flex:1;font-size:11px;padding:4px 6px;border:1px solid var(--border2);border-radius:4px;font-family:inherit">${projOptions}</select>`
            :`<span class="ro" style="flex:1">${linkedProj?escHtml(linkedProj.title):'— nessun progetto —'}</span>`}
      </div>
      ${subs.length?subsHtml:'<div style="font-size:11px;color:var(--text3);padding:6px 0">Nessun sotto-obiettivo.</div>'}
      ${ed?`<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap" onclick="event.stopPropagation()">
        <input type="text" id="newsub-t-${obj.id}" placeholder="Sotto-obiettivo..." style="flex:2;min-width:140px;font-size:11px;padding:5px 7px;border:1px solid var(--border2);border-radius:4px;font-family:inherit" />
        <input type="number" id="newsub-tg-${obj.id}" placeholder="target" style="width:64px;font-size:11px;padding:5px 7px;border:1px solid var(--border2);border-radius:4px;font-family:inherit" />
        <input type="text" id="newsub-u-${obj.id}" placeholder="unità" style="width:64px;font-size:11px;padding:5px 7px;border:1px solid var(--border2);border-radius:4px;font-family:inherit" />
        <input type="date" id="newsub-d-${obj.id}" style="font-size:11px;padding:4px 6px;border:1px solid var(--border2);border-radius:4px;font-family:inherit" />
        <button class="btn btn-primary" style="width:auto;padding:5px 12px;font-size:11px" onclick="addSubObjective(${obj.id})">+ Aggiungi</button>
      </div>`:''}
    </div>
  </div>`;
}

function toggleMboObj(id){mboExpandedObj[id]=!mboExpandedObj[id];const el=document.getElementById('mbo-sub-'+id);if(el)el.classList.toggle('open',mboExpandedObj[id]);}

function goToProject(projectId){
  switchView('gantt');
  setTimeout(()=>openProjectModal(projectId),120);
}

// ── MBO: SAVE (live) ──────────────────────────────────────────
async function updateCardField(cardId,field,value){
  if(currentRole!=='admin')return;
  let val=value===''?null:Number(value);
  const{error}=await sb.from('mbo_cards').update({[field]:val,updated_at:new Date().toISOString()}).eq('id',cardId);
  if(error){showToast('Errore: '+error.message,'error');return}
  const c=mboCards.find(x=>x.id===cardId);if(c)c[field]=val;
  renderMBO();
}
// scrivere a mano la % => passa in modalita manuale
async function updateObjPct(objId,value){
  if(currentRole!=='admin')return;
  const val=Number(value)||0;
  const{error}=await sb.from('mbo_objectives').update({achievement_pct:val,manual_pct:true}).eq('id',objId);
  if(error){showToast('Errore: '+error.message,'error');return}
  const o=mboObjectives.find(x=>x.id===objId);if(o){o.achievement_pct=val;o.manual_pct=true;}
  renderMBO();
}
// toggle auto/manuale
async function toggleObjManual(objId){
  if(currentRole!=='admin')return;
  const o=mboObjectives.find(x=>x.id===objId);if(!o)return;
  const newManual=!o.manual_pct;
  // se torno in auto, salvo anche il valore calcolato come riferimento
  const autoVal=mboAutoPct(objId);
  const payload=newManual?{manual_pct:true}:{manual_pct:false,achievement_pct:autoVal};
  const{error}=await sb.from('mbo_objectives').update(payload).eq('id',objId);
  if(error){showToast('Errore: '+error.message,'error');return}
  o.manual_pct=newManual;if(!newManual)o.achievement_pct=autoVal;
  renderMBO();
  showToast(newManual?'% in modalita manuale':'% in calcolo automatico','success');
}
// collegamento obiettivo -> progetto dal menu a tendina
async function linkObjProject(objId,projectIdStr){
  if(currentRole!=='admin')return;
  const projectId=projectIdStr===''?null:Number(projectIdStr);
  const{error}=await sb.from('mbo_objectives').update({project_id:projectId}).eq('id',objId);
  if(error){showToast('Errore: '+error.message,'error');return}
  const o=mboObjectives.find(x=>x.id===objId);if(o)o.project_id=projectId;
  renderMBO();
  showToast(projectId?'Progetto collegato':'Collegamento rimosso','success');
}
// sotto-obiettivo: salva valore; se l'obiettivo e in auto, ricalcola e salva la % e il €
async function updateSubField(subId,field,value){
  if(currentRole!=='admin')return;
  let val=(field==='done')?(value===true||value==='true'):Number(value);
  const patch={[field]:val};
  if(field==='current_value'){ const s0=mboSubs.find(x=>x.id===subId); patch.done = (s0 && s0.target_value>0) ? (val>=s0.target_value) : !!val; }
  const{error}=await sb.from('mbo_subobjectives').update(patch).eq('id',subId);
  if(error){showToast('Errore: '+error.message,'error');return}
  const s=mboSubs.find(x=>x.id===subId);if(s){s[field]=val;if('done'in patch)s.done=patch.done;}
  // se l'obiettivo padre e in modalita auto, aggiorna la sua % salvata e rerender (cosi il € si aggiorna)
  if(s){
    const o=mboObjectives.find(x=>x.id===s.objective_id);
    if(o&&!o.manual_pct){
      const auto=mboAutoPct(o.id);
      o.achievement_pct=auto;
      sb.from('mbo_objectives').update({achievement_pct:auto}).eq('id',o.id);
      renderMBO();
    }
  }
}

// aggiungi sotto-obiettivo dal dettaglio dell'obiettivo
async function addSubObjective(objId){
  if(currentRole!=='admin')return;
  const title=(document.getElementById('newsub-t-'+objId).value||'').trim();
  const target=Number(document.getElementById('newsub-tg-'+objId).value)||0;
  const unit=(document.getElementById('newsub-u-'+objId).value||'').trim();
  const due=document.getElementById('newsub-d-'+objId).value||null;
  if(!title){showToast('Inserisci il titolo del sotto-obiettivo','error');return}
  const maxSort=mboSubs.filter(s=>s.objective_id===objId).reduce((m,s)=>Math.max(m,s.sort_order||0),0);
  const{data,error}=await sb.from('mbo_subobjectives').insert({
    objective_id:objId,title,current_value:0,target_value:target,unit:unit||null,due_date:due,sort_order:maxSort+1
  }).select().single();
  if(error){showToast('Errore: '+error.message,'error');return}
  mboSubs.push(data);
  mboExpandedObj[objId]=true;
  // se obiettivo in auto, ricalcola
  const o=mboObjectives.find(x=>x.id===objId);
  if(o&&!o.manual_pct){const auto=mboAutoPct(objId);o.achievement_pct=auto;sb.from('mbo_objectives').update({achievement_pct:auto}).eq('id',objId);}
  renderMBO();
  showToast('Sotto-obiettivo aggiunto','success');
}

// modifica sotto-obiettivo: apri editor inline
function startEditSub(subId){
  if(currentRole!=='admin')return;
  mboEditingSub=subId;
  renderMBO();
}
function cancelEditSub(){
  mboEditingSub=null;
  renderMBO();
}
// salva modifiche al sotto-obiettivo (titolo, target, unità, scadenza)
async function saveEditSub(subId){
  if(currentRole!=='admin')return;
  const title=(document.getElementById('edsub-t-'+subId).value||'').trim();
  const target=Number(document.getElementById('edsub-tg-'+subId).value)||0;
  const unit=(document.getElementById('edsub-u-'+subId).value||'').trim();
  const due=document.getElementById('edsub-d-'+subId).value||null;
  if(!title){showToast('Inserisci il titolo del sotto-obiettivo','error');return}
  const s=mboSubs.find(x=>x.id===subId);if(!s)return;
  // ricalcola done in base al nuovo target (se non è del tipo "fatto")
  const newDone = unit==='fatto' ? !!Number(s.current_value) : (target>0 ? Number(s.current_value)>=target : !!Number(s.current_value));
  const patch={title,target_value:target,unit:unit||null,due_date:due,done:newDone};
  const{error}=await sb.from('mbo_subobjectives').update(patch).eq('id',subId);
  if(error){showToast('Errore: '+error.message,'error');return}
  Object.assign(s,patch);
  mboEditingSub=null;
  // se obiettivo padre in auto, ricalcola la sua %
  const o=mboObjectives.find(x=>x.id===s.objective_id);
  if(o&&!o.manual_pct){const auto=mboAutoPct(o.id);o.achievement_pct=auto;sb.from('mbo_objectives').update({achievement_pct:auto}).eq('id',o.id);}
  renderMBO();
  showToast('Sotto-obiettivo aggiornato','success');
}
// elimina sotto-obiettivo
async function deleteSubObjective(subId){
  if(currentRole!=='admin')return;
  const s=mboSubs.find(x=>x.id===subId);if(!s)return;
  if(!confirm('Eliminare il sotto-obiettivo "'+(s.title||'')+'"?'))return;
  const objId=s.objective_id;
  const{error}=await sb.from('mbo_subobjectives').delete().eq('id',subId);
  if(error){showToast('Errore: '+error.message,'error');return}
  mboSubs=mboSubs.filter(x=>x.id!==subId);
  if(mboEditingSub===subId)mboEditingSub=null;
  // se obiettivo padre in auto, ricalcola
  const o=mboObjectives.find(x=>x.id===objId);
  if(o&&!o.manual_pct){const auto=mboAutoPct(objId);o.achievement_pct=auto;sb.from('mbo_objectives').update({achievement_pct:auto}).eq('id',objId);}
  renderMBO();
  showToast('Sotto-obiettivo eliminato','success');
}

async function saveMboCard(){
  if(currentRole!=='admin')return;
  const personSel=document.getElementById('mbo-add-person').value;
  let personId=personSel?Number(personSel):null;

  // crea nuova persona se necessario
  if(!personId){
    const name=document.getElementById('mbo-add-name').value.trim();
    const role=document.getElementById('mbo-add-role').value.trim();
    if(!name){showToast('Inserisci il nome della persona','error');return}
    const maxSort=mboPeople.reduce((m,p)=>Math.max(m,p.sort_order||0),0);
    const{data,error}=await sb.from('mbo_people').insert({full_name:name,role_label:role,sort_order:maxSort+1}).select().single();
    if(error){showToast('Errore: '+error.message,'error');return}
    mboPeople.push(data);personId=data.id;
  }

  const year=parseInt(document.getElementById('mbo-add-year').value)||new Date().getFullYear();
  const model=document.getElementById('mbo-add-model').value;
  const bonus=Number(document.getElementById('mbo-add-bonus').value)||0;
  const ebitda=Number(document.getElementById('mbo-add-ebitda').value)||0;
  const gate=(Number(document.getElementById('mbo-add-gate').value)||0)/100;

  // evita duplicati persona/anno
  if(mboCards.some(c=>c.person_id===personId&&c.year===year)){
    showToast('Esiste già una scheda per questa persona e anno','error');return;
  }

  const{data:card,error:cErr}=await sb.from('mbo_cards').insert({
    person_id:personId,year,target_bonus:bonus,ebitda_target:ebitda,gate_pct:gate,payout_model:model
  }).select().single();
  if(cErr){showToast('Errore: '+cErr.message,'error');return}
  mboCards.push(card);

  // 3 obiettivi 40/30/30
  const titles=[
    document.getElementById('mbo-add-o1').value.trim()||'Obiettivo 1',
    document.getElementById('mbo-add-o2').value.trim()||'Obiettivo 2',
    document.getElementById('mbo-add-o3').value.trim()||'Obiettivo 3',
  ];
  const objRows=[
    {card_id:card.id,obj_number:1,title:titles[0],weight:0.40,sort_order:1},
    {card_id:card.id,obj_number:2,title:titles[1],weight:0.30,sort_order:2},
    {card_id:card.id,obj_number:3,title:titles[2],weight:0.30,sort_order:3},
  ];
  const{data:objs,error:oErr}=await sb.from('mbo_objectives').insert(objRows).select();
  if(oErr){showToast('Scheda creata, errore obiettivi: '+oErr.message,'error');}
  else{(objs||[]).forEach(o=>mboObjectives.push(o));}

  // aggiorna i filtri (anno/persona) e seleziona
  const years=[...new Set(mboCards.map(c=>c.year))].sort((a,b)=>b-a);
  document.getElementById('mbo-year-filter').innerHTML=years.map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('');
  document.getElementById('mbo-person-filter').innerHTML='<option value="all">Tutte</option>'+mboPeople.map(p=>`<option value="${p.id}">${escHtml(p.full_name)}</option>`).join('');

  closeModal();
  renderMBO();
  showToast('Scheda MBO creata. Aggiungi i sotto-obiettivi dal dettaglio.','success');
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function formatDate(d){
  if(!d)return'—';
  const dt=new Date(d);
  const m=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  return`${dt.getDate()} ${m[dt.getMonth()]} ${dt.getFullYear()}`;
}
let toastTimeout;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+type;
  clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>{t.className=''},3500);
}
</script>
