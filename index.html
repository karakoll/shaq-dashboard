<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>R&D Dashboard 2025-2028 - Colorificio Sammarinese</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:          #D0D0D0;
  --bg2:         #C4C4C4;
  --bg3:         #B8B8B8;
  --bg4:         #DEDEDE;
  --border:      #AFAFAF;
  --border2:     #9E9E9E;
  --text:        #1A1A1A;
  --text2:       #3A3A3A;
  --text3:       #666666;
  --text4:       #888888;
  --accent:      #2B5EA7;
  --accent2:     #1A3F75;
  --red:         #C0392B;
  --green:       #1E7E4A;
  --blue:        #2B5EA7;
  --yellow:      #B07D00;
  --purple:      #6B3FA0;
  --orange:      #B85C00;
  --col-edilizia:    #2B5EA7;
  --col-slv:         #B85C00;
  --col-h2o:         #0077A8;
  --col-color:       #6B3FA0;
  --col-tracc:       #1E7E4A;
  --col-cq:          #B07D00;
  --shadow:      0 2px 8px rgba(0,0,0,0.12);
  --shadow2:     0 4px 20px rgba(0,0,0,0.15);
  --radius:      6px;
  --radius2:     12px;
  --gantt-row-h: 38px;
  --gantt-header-h: 50px;
  --sidebar-w:   290px;
  --topbar-h:    58px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;font-weight:400;line-height:1.5;min-height:100vh}
::selection{background:var(--accent);color:white}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* LOGIN */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1000;padding:24px}
.login-card{width:100%;max-width:380px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius2);padding:44px 36px;text-align:center;box-shadow:var(--shadow2)}
.login-logo-img{width:56px;height:56px;object-fit:contain;margin:0 auto 20px;display:block;filter:brightness(0.15)}
.login-card h1{font-family:"DM Serif Display",serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:4px;line-height:1.3}
.login-card p{color:var(--text3);font-size:13px;margin-bottom:28px}
.form-group{margin-bottom:14px;text-align:left}
.form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:white;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color .2s;font-family:inherit;font-size:13px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:65px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.btn-primary{background:var(--accent);color:white;width:100%;padding:11px}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-small{padding:4px 10px;font-size:11px}
.btn-danger{background:transparent;color:var(--red);border:1px solid transparent;padding:4px 8px;font-size:11px}
.btn-danger:hover{background:rgba(192,57,43,.1);border-color:var(--red)}
.login-error{color:var(--red);font-size:12px;margin-top:10px;min-height:18px}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}

/* TOPBAR */
#topbar{height:var(--topbar-h);background:var(--bg4);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.topbar-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-logo-img{height:28px;width:auto;object-fit:contain;filter:brightness(0.2)}
.topbar-title{font-family:"DM Serif Display",serif;font-size:15px;color:var(--text);line-height:1.2}
.topbar-subtitle{font-size:10px;color:var(--text3)}
.topbar-sep{flex:1}
#date-indicator{display:flex;align-items:center;gap:8px;padding:5px 12px;background:white;border:1px solid var(--border2);border-radius:20px;flex-shrink:0}
.date-today{font-size:12px;font-weight:600;color:var(--accent)}
.date-position{font-size:11px;color:var(--text3)}
.date-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
.user-badge{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text)}
.role-badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.role-admin{background:rgba(43,94,167,.15);color:var(--accent)}
.role-viewer{background:rgba(100,100,100,.15);color:var(--text3)}
.role-viewer_completo{background:rgba(43,94,167,.15);color:var(--accent)}

/* MAIN */
#main-content{flex:1;padding:20px}

/* KPI */
#kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.kpi-card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius2);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;user-select:none}
.kpi-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow2)}
.kpi-card.kpi-active-filter{border-color:var(--accent);background:white;box-shadow:0 0 0 2px var(--accent)}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.kpi-value{font-family:"DM Serif Display",serif;font-size:26px;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.kpi-bar{margin-top:8px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .6s}

/* FILTERS */
#filters-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);flex-shrink:0}
.filter-chip{padding:4px 11px;border-radius:20px;border:1px solid var(--border2);background:white;color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{color:white;font-weight:600;border-color:transparent}
.fc-all.active{background:var(--text3)}
.fc-edilizia.active{background:var(--col-edilizia)}
.fc-slv.active{background:var(--col-slv)}
.fc-h2o.active{background:var(--col-h2o)}
.fc-color.active{background:var(--col-color)}
.fc-tracc.active{background:var(--col-tracc)}
.fc-cq.active{background:var(--col-cq)}
.filter-sep{width:1px;height:20px;background:var(--border2)}
.status-filter{padding:4px 11px;border-radius:var(--radius);border:1px solid var(--border2);background:white;color:var(--text2);font-size:11px;outline:none;cursor:pointer;font-family:inherit}

/* GANTT */
#gantt-wrapper{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;box-shadow:var(--shadow)}
#gantt-scroll-container{overflow-x:auto}
.gantt-today-line{position:fixed;top:var(--topbar-h);bottom:0;width:2px;background:var(--accent);z-index:50;pointer-events:none;opacity:.7}
.gantt-today-line::before{content:"OGGI";position:absolute;top:4px;left:4px;font-size:9px;font-weight:700;color:white;letter-spacing:.06em;background:var(--accent);border-radius:3px;padding:2px 5px;white-space:nowrap}
.project-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-pianificato{background:var(--text4,#888)}
.status-in_corso{background:var(--blue);box-shadow:0 0 0 2px rgba(43,94,167,.25)}
.status-completato{background:var(--green)}
.status-sospeso{background:var(--red)}
.project-expand-btn{width:14px;height:14px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:all .15s}
.project-expand-btn:hover{background:var(--border)}
.project-expand-btn.no-children{opacity:0;pointer-events:none}
.project-name{font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.gantt-bar{position:absolute;height:22px;border-radius:4px;z-index:2;display:flex;align-items:center;overflow:hidden;transition:filter .15s,box-shadow .15s;cursor:pointer;min-width:4px}
.gantt-bar:hover{filter:brightness(.88);box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:10}
.gantt-bar-progress{height:100%;position:absolute;left:0;top:0;border-radius:4px 0 0 4px;background:rgba(0,0,0,.18)}
.gantt-bar-label{position:relative;z-index:1;font-size:10px;font-weight:700;padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none;color:white;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.gantt-milestone{position:absolute;width:8px;height:8px;transform:rotate(45deg) translateX(-50%);z-index:8;cursor:pointer;transition:transform .15s;border:1px solid #1a1a1a;box-shadow:0 0 0 1px rgba(255,255,255,.85)}
.gantt-milestone:hover{transform:rotate(45deg) translateX(-50%) scale(1.6)}
.milestone-done{background:#39FF14}
.milestone-pending{background:#FFF312}

/* TOOLTIP */
#gantt-tooltip{position:fixed;z-index:1000;background:white;border:1px solid var(--border2);border-radius:var(--radius2);padding:14px 16px;max-width:300px;pointer-events:none;display:none;box-shadow:var(--shadow2);font-size:12px}
.tt-title{font-weight:600;color:var(--text);margin-bottom:8px;font-size:13px;line-height:1.3}
.tt-row{display:flex;gap:8px;color:var(--text2);margin-bottom:4px}
.tt-key{color:var(--text3);flex-shrink:0;min-width:70px}
.tt-status-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.badge-pianificato{background:rgba(100,100,100,.1);color:var(--text3)}
.badge-in_corso{background:rgba(43,94,167,.15);color:var(--blue)}
.badge-completato{background:rgba(30,126,74,.15);color:var(--green)}
.badge-sospeso{background:rgba(192,57,43,.12);color:var(--red)}
.tt-progress-bar{margin-top:10px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.tt-progress-fill{height:100%;border-radius:2px}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
#modal-overlay.open{display:flex}
.modal{background:white;border:1px solid var(--border);border-radius:var(--radius2);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:26px 28px;box-shadow:var(--shadow2)}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.modal-header h2{font-family:"DM Serif Display",serif;font-size:18px;font-weight:400;flex:1}
.modal-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 6px;border-radius:4px}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
.milestone-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;font-size:12px}
.mi-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.mi-check.done{background:var(--green);border-color:var(--green);color:white}
.mi-check.admin-check{cursor:pointer}
.mi-check.admin-check:hover{border-color:var(--accent)}
.mi-name{flex:1;color:var(--text)}
.mi-name.done-name{text-decoration:line-through;color:var(--text3)}
.mi-date{color:var(--text3);font-size:11px;flex-shrink:0}
.mi-delete{background:none;border:none;color:var(--text4);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:3px;line-height:1}
.mi-delete:hover{background:rgba(192,57,43,.1);color:var(--red)}
.add-milestone-form{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.add-milestone-form input{flex:1;min-width:150px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-family:inherit;font-size:12px;background:var(--bg);color:var(--text);outline:none}
.add-milestone-form input:focus{border-color:var(--accent)}
.add-milestone-form .btn{padding:7px 12px;font-size:12px;width:auto}
.mi-edit{border:none;background:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 4px;line-height:1}
.mi-edit:hover{color:var(--accent)}
.mi-edit-form{display:flex;gap:6px;align-items:center;flex-wrap:wrap;width:100%}
.mi-edit-form input[type=text]{flex:2;min-width:120px;padding:5px 8px;border:1px solid var(--border2);border-radius:4px;font-family:inherit;font-size:12px;background:var(--bg);color:var(--text)}
.mi-edit-form input[type=date]{padding:5px 8px;border:1px solid var(--border2);border-radius:4px;font-family:inherit;font-size:12px;background:var(--bg);color:var(--text)}
.mi-edit-form .btn{padding:5px 10px;font-size:11px;width:auto}
.area-add-btn:hover{color:var(--accent)!important}
.drag-handle:active{cursor:grabbing}
.gantt-project-row.dragging{opacity:.4}
.gantt-project-row.drop-above{box-shadow:inset 0 3px 0 0 var(--accent)}
.gantt-project-row.drop-below{box-shadow:inset 0 -3px 0 0 var(--accent)}
.gantt-area-header.drop-target,.gantt-area-empty.drop-target{outline:2px dashed var(--accent);outline-offset:-2px}
.gantt-area-header.sec-dragging{opacity:.5}
.gantt-area-header.sec-drop-above{box-shadow:inset 0 3px 0 0 var(--accent2)}
.gantt-area-header.sec-drop-below{box-shadow:inset 0 -3px 0 0 var(--accent2)}
.sec-drag-handle:active{cursor:grabbing}
.sec-move-btn:disabled{opacity:.4}

/* TABS (Gantt / MBO) */
#view-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.view-tab{padding:9px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:-1px}
.view-tab:hover{color:var(--text)}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MBO VIEW */
#mbo-view{display:none}
.mbo-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.mbo-toolbar select{padding:7px 12px;background:white;border:1px solid var(--border2);border-radius:var(--radius);font-family:inherit;font-size:13px;color:var(--text);outline:none}
.mbo-toolbar select:focus{border-color:var(--accent)}
.mbo-card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius2);padding:0;box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.mbo-card-head{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.mbo-card-head .mbo-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.mbo-card-head .mbo-who{flex:1;min-width:140px}
.mbo-card-head .mbo-name{font-family:"DM Serif Display",serif;font-size:17px}
.mbo-card-head .mbo-rolelbl{font-size:11px;color:var(--text3)}
.mbo-bonus-box{text-align:right;padding:6px 14px;background:white;border:1px solid var(--border);border-radius:var(--radius)}
.mbo-bonus-box .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:700}
.mbo-bonus-box .val{font-family:"DM Serif Display",serif;font-size:20px;line-height:1.1}
.mbo-bonus-box .val.zero{color:var(--red)}
.mbo-bonus-box .val.ok{color:var(--green)}
.mbo-bonus-box .sub{font-size:10px;color:var(--text3)}
.mbo-gate{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
.mbo-gate .field{}
.mbo-gate label{display:block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.mbo-gate input,.mbo-gate .ro{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-family:inherit;font-size:13px;color:var(--text);outline:none;background:white}
.mbo-gate input:focus{border-color:var(--accent)}
.mbo-gate .ro{background:var(--bg3);color:var(--text2)}
.mbo-gate-status{grid-column:1/-1;font-size:12px;padding:9px 12px;border-radius:var(--radius);font-weight:600;border-left:3px solid transparent}
.mbo-gate-status.pass{background:rgba(30,126,74,.12);color:#155F38;border-left-color:var(--green)}
.mbo-gate-status.warn{background:rgba(176,125,0,.18);color:#7A5600;border-left-color:#B07D00}
.mbo-gate-status.fail{background:rgba(192,57,43,.12);color:#9C2B20;border-left-color:var(--red)}
.mbo-objs{padding:8px 20px 16px}
.mbo-obj{border:1px solid var(--border);border-radius:var(--radius);margin-top:12px;background:white;overflow:hidden}
.mbo-obj-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.mbo-obj-head:hover{background:var(--bg)}
.mbo-obj-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbo-obj-title{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.mbo-obj-weight{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:10px;flex-shrink:0}
.mbo-obj-eur{font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0;min-width:64px;text-align:right}
.mbo-obj-prog{display:flex;align-items:center;gap:8px;padding:0 14px 11px}
.mbo-obj-prog .bar{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.mbo-obj-prog .bar > div{height:100%;border-radius:4px;transition:width .4s}
.mbo-obj-prog .pctin{width:64px;padding:4px 6px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;font-family:inherit;text-align:right;outline:none}
.mbo-obj-prog .pctin:focus{border-color:var(--accent)}
.mbo-obj-prog .pctin.auto{background:var(--bg);color:var(--text3)}
.mbo-obj-prog .tier{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:10px;flex-shrink:0}
.mbo-auto-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text4);cursor:pointer;border:1px solid var(--border2);border-radius:8px;padding:1px 6px;background:var(--bg)}
.mbo-auto-badge:hover{border-color:var(--accent);color:var(--accent)}
.mbo-auto-badge.man{color:var(--accent);border-color:var(--accent)}
/* timeline avanzamento vs tempo */
.mbo-timeline{padding:0 14px 12px}
.mbo-timeline .tl-bar{position:relative;height:14px;background:var(--border);border-radius:7px;overflow:visible}
.mbo-timeline .tl-fill{position:absolute;left:0;top:0;height:100%;border-radius:7px;transition:width .5s}
.mbo-timeline .tl-today{position:absolute;top:-3px;width:2px;height:20px;background:var(--text);border-radius:1px}
.mbo-timeline .tl-today::after{content:'oggi';position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:var(--text2);white-space:nowrap}
.mbo-timeline .tl-legend{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:10px;color:var(--text3)}
.mbo-timeline .tl-status{font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px}
.tl-ahead{background:rgba(30,126,74,.16);color:#155F38}
.tl-ontrack{background:rgba(43,94,167,.14);color:#1A3F75}
.tl-behind{background:rgba(192,57,43,.14);color:#9C2B20}
.tier-0{background:var(--bg3);color:var(--text3)}
.tier-50{background:rgba(176,125,0,.18);color:#7A5600}
.tier-75{background:rgba(43,94,167,.16);color:#1A3F75}
.tier-100{background:rgba(30,126,74,.16);color:#155F38}
.mbo-sub{border-top:1px solid var(--border);padding:6px 14px 10px;display:none}
.mbo-sub.open{display:block}
.mbo-sub-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;border-bottom:1px dashed var(--border)}
.mbo-sub-item:last-child{border-bottom:none}
.mbo-sub-item .nm{flex:1;color:var(--text2)}
.mbo-sub-item .vals{display:flex;align-items:center;gap:4px;flex-shrink:0}
.mbo-sub-item .vals input{width:54px;padding:3px 5px;border:1px solid var(--border2);border-radius:4px;font-size:11px;text-align:right;font-family:inherit;outline:none}
.mbo-sub-item .vals input:focus{border-color:var(--accent)}
.mbo-sub-item .vals .tg{color:var(--text3);font-size:11px}
.mbo-sub-item .dd{font-size:10px;color:var(--text3);flex-shrink:0;min-width:62px;text-align:right}
.mbo-sub-item .lnk{font-size:11px;color:var(--accent);text-decoration:none;flex-shrink:0}
.mbo-sub-item .lnk:hover{text-decoration:underline}
.mbo-sub-btn{flex-shrink:0;background:none;border:none;cursor:pointer;font-size:12px;line-height:1;padding:3px 5px;border-radius:4px;color:var(--text3);opacity:.65;transition:opacity .15s,background .15s}
.mbo-sub-btn:hover{opacity:1;background:var(--border)}
.mbo-sub-btn.del:hover{color:var(--red)}
.mbo-sub-btn.ok{color:var(--green);opacity:1}
.mbo-sub-edit{flex-wrap:wrap}
.mbo-obj-actions{padding:0 14px 12px;display:flex;justify-content:flex-end}
.mbo-empty{padding:50px;text-align:center;color:var(--text3);font-size:13px}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:white;border:1px solid var(--border2);border-radius:var(--radius2);padding:11px 16px;font-size:13px;color:var(--text);box-shadow:var(--shadow2);z-index:2000;transform:translateY(16px);opacity:0;transition:all .3s;max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{border-left:3px solid var(--green)}
#toast.error{border-left:3px solid var(--red)}

/* LOADING */
.loading-state{padding:60px;text-align:center;color:var(--text3)}
.loading-spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE */
@media(max-width:768px){
  :root{--sidebar-w:155px;--gantt-row-h:34px;--topbar-h:52px}
  #topbar{padding:0 12px;gap:8px}
  .topbar-subtitle{display:none}
  #date-indicator .date-position{display:none}
  #main-content{padding:10px}
  #kpi-strip{grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .kpi-card{padding:10px 12px}
  .kpi-value{font-size:20px}
  #filters-bar{gap:6px}
  .filter-chip{padding:3px 8px;font-size:10px}
  .filter-label,.filter-sep{display:none}
  .status-filter{font-size:10px;padding:3px 8px}
  .project-name{font-size:11px}
  .mbo-card-head{gap:8px}
  .mbo-bonus-box{flex:1;text-align:left}
  .mbo-gate{grid-template-columns:1fr 1fr}
  .mbo-obj-head{flex-wrap:wrap}
  .gantt-bar-label{font-size:9px}
  .modal{padding:16px;max-height:94vh}
  .modal-header h2{font-size:15px}
  #user-name,.topbar-subtitle{display:none}
}
@media(max-width:480px){
  :root{--sidebar-w:125px}
  #kpi-strip{grid-template-columns:repeat(2,1fr)}
}
</style>

  <main id="main-content">
    <div id="view-tabs">
      <button class="view-tab active" id="tab-gantt" onclick="switchView('gantt')">Gantt Progetti</button>
      <button class="view-tab" id="tab-mbo" onclick="switchView('mbo')" style="display:none">MBO</button>
    </div>

    <div id="gantt-view">
    <div id="kpi-strip">
      <div class="kpi-card" id="kpi-card-all" onclick="setKpiFilter('all')">
        <div class="kpi-label">Progetti Totali</div>
        <div class="kpi-value" id="kpi-total">-</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" id="kpi-bar-total" style="width:100%;background:var(--border2)"></div></div>
      </div>
      <div class="kpi-card" id="kpi-card-in_corso" onclick="setKpiFilter('in_corso')">
        <div class="kpi-label">In Corso</div>
        <div class="kpi-value" id="kpi-active" style="color:var(--blue)">-</div>
        <div class="kpi-sub" id="kpi-active-sub"></div>
        <div class="kpi-bar"><div class="kpi-bar-fill" id="kpi-bar-active" style="background:var(--blue)"></div></div>
      </div>
      <div class="kpi-card" id="kpi-card-completato" onclick="setKpiFilter('completato')">
        <div class="kpi-label">Completati</div>
        <div class="kpi-value" id="kpi-done" style="color:var(--green)">-</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" id="kpi-bar-done" style="background:var(--green)"></div></div>
      </div>
      <div class="kpi-card" id="kpi-card-sospeso" onclick="setKpiFilter('sospeso')">
        <div class="kpi-label">Sospesi</div>
        <div class="kpi-value" id="kpi-suspended" style="color:var(--red)">-</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" id="kpi-bar-susp" style="background:var(--red)"></div></div>
      </div>
      <div class="kpi-card" id="kpi-card-pianificato" onclick="setKpiFilter('pianificato')">
        <div class="kpi-label">Avanzamento Medio</div>
        <div class="kpi-value" id="kpi-progress" style="color:var(--accent)">-</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" id="kpi-bar-prog" style="background:var(--accent)"></div></div>
      </div>
    </div>

    <div id="filters-bar">
      <span class="filter-label">Area</span>
      <span id="area-chips" style="display:contents"></span>
      <div class="filter-sep"></div>
      <span class="filter-label">Zoom</span>
      <button class="btn btn-ghost btn-small" onclick="setZoom('year')" id="zoom-year">Anno</button>
      <button class="btn btn-ghost btn-small" onclick="setZoom('half')" id="zoom-half">Semestre</button>
      <button class="btn btn-ghost btn-small" onclick="setZoom('full')" id="zoom-full" style="color:var(--accent);border-color:var(--accent)">4 Anni</button>
    </div>

    <div id="admin-gantt-toolbar" style="display:none;gap:8px;flex-wrap:wrap;align-items:center;padding:8px 4px 2px">

      <button class="btn btn-ghost btn-small" onclick="openNewProjectModal()">+ Nuovo progetto</button>
      <div class="filter-sep"></div>
      <button class="btn btn-ghost btn-small" onclick="createSection()">+ Genera sezione</button>
      <button class="btn btn-ghost btn-small" onclick="renameSection()">Rinomina sezione</button>
      <button class="btn btn-ghost btn-small" onclick="recolorSection()">Colore sezione</button>
      <button class="btn btn-ghost btn-small" onclick="removeSection()">Rimuovi sezione</button>
    </div>

      <div id="gantt-scroll-container">

        </div>
      </div>
    </div>
    </div><!-- /#gantt-view -->

    <div id="mbo-view">
      <div class="mbo-toolbar">
        <span class="filter-label">Anno</span>
        <select id="mbo-year-filter" onchange="renderMBO()"></select>
        <span class="filter-label">Persona</span>
        <select id="mbo-person-filter" onchange="renderMBO()"><option value="all">Tutte</option></select>
        <div style="flex:1"></div>
        <button class="btn btn-ghost btn-small" id="mbo-add-btn" onclick="openMboAddModal()">+ Aggiungi scheda MBO</button>
      </div>
      <div id="mbo-list">
        <div class="loading-state"><div class="loading-spinner"></div>Caricamento MBO...</div>
      </div>
    </div><!-- /#mbo-view -->
  </main>
</div>

<div id="gantt-tooltip"></div>
<div id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<div id="toast"></div>
<div id="gantt-today-line" class="gantt-today-line" style="display:none"></div>

<script>
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser=null, currentRole='viewer';
// Helper ruoli: chi può vedere/modificare cosa
function canViewMbo(){return currentRole==='admin'||currentRole==='viewer_completo';}
function canEditMbo(){return currentRole==='admin';}
let allProjects=[], allSubtasks=[], allMilestones=[];
let allSections=[];            // righe gantt_sections {id,name,color,sort_order}
let activeAreaFilter='all', activeStatusFilter='all', activeKpiFilter='all';
let expandedAreas={}, expandedProjects={};
let currentZoom='full';
let currentModalProjectId=null;
let dragProjectId=null;        // drag&drop: progetto trascinato
let dragSectionName=null;      // drag&drop: sezione trascinata
let currentView='gantt';
let mboPeople=[], mboCards=[], mboObjectives=[], mboSubs=[];
let mboLoaded=false;
let mboExpandedObj={};
let mboEditingSub=null;

const PROGRAM_START=new Date('2025-01-01');
const PROGRAM_END=new Date('2028-12-31');

// Colori di fallback per le 6 sezioni storiche (usati se gantt_sections non è ancora caricata)
const AREA_COLORS_FALLBACK={
  'Edilizia':'#2B5EA7','Industria SLV':'#B85C00','Industria H2O':'#0077A8',
  'Colorimetria':'#6B3FA0','Traccianti':'#1E7E4A',
  'Controllo Qualita':'#B07D00','Controllo Qualità':'#B07D00'
};
// Palette proposta per nuove sezioni (Bordeaux in testa) — quelle non ancora usate vengono offerte
const SECTION_PALETTE=[
  '#8E2436','#4A4A4A','#0E7C7B','#7A5C1E','#3B5323','#5D3A9B',
  '#A64B00','#1F6F8B','#8C1D40','#2E6E4E','#6E4B1F','#455A64'
];
// Restituisce il colore di una sezione (da gantt_sections, poi fallback, poi grigio)
function AREA_COLORS(area){
  const s=allSections.find(x=>x.name===area);
  if(s&&s.color)return s.color;
  return AREA_COLORS_FALLBACK[area]||'#666666';
}
// Elenco ordinato dei nomi sezione da mostrare: unione gantt_sections + aree presenti sui progetti
function orderedAreaNames(){
  const names=[];
  allSections.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).forEach(s=>{if(!names.includes(s.name))names.push(s.name)});
  // aree presenti sui progetti ma non registrate in gantt_sections (retrocompat)
  [...new Set(allProjects.map(p=>p.area))].forEach(a=>{if(a&&!names.includes(a))names.push(a)});
  return names;
}

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!email||!password){errEl.textContent='Inserisci email e password.';return}
  const{data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){errEl.textContent=error.message;return}
  await initApp(data.user);
}
async function doLogout(){await sb.auth.signOut();location.reload()}
async function initApp(user){
  currentUser=user;
  const{data:profile}=await sb.from('profiles').select('role,full_name').eq('id',user.id).single();
  currentRole=profile?.role||'viewer';
  const name=profile?.full_name||user.email.split('@')[0];
  document.getElementById('user-name').textContent=name;
  document.getElementById('user-avatar').textContent=name.charAt(0).toUpperCase();
  const rb=document.getElementById('role-badge');
  const roleLabels={admin:'admin',viewer:'viewer',viewer_completo:'viewer completo'};
  rb.textContent=roleLabels[currentRole]||currentRole;rb.className='role-badge role-'+currentRole;
  document.getElementById('tab-mbo').style.display = canViewMbo() ? '' : 'none';
  const agt=document.getElementById('admin-gantt-toolbar');
  if(agt)agt.style.display = currentRole==='admin' ? 'flex' : 'none';
  const mab=document.getElementById('mbo-add-btn');
  if(mab)mab.style.display = canEditMbo() ? '' : 'none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  updateDateIndicator();
  await loadData();
  startKeepAlive();
}
sb.auth.getSession().then(({data:{session}})=>{if(session?.user)initApp(session.user)});
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

// ── DATE ──────────────────────────────────────────────────────
function updateDateIndicator(){
  const today=new Date();
  const m=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  document.getElementById('today-label').textContent=`${today.getDate()} ${m[today.getMonth()]} ${today.getFullYear()}`;
  const pct=Math.max(0,Math.min(100,((today-PROGRAM_START)/(PROGRAM_END-PROGRAM_START)*100))).toFixed(0);
  document.getElementById('program-position').textContent=`Anno ${today.getFullYear()} - ${pct}% del programma`;
}

// ── DATA ──────────────────────────────────────────────────────
async function loadData(){
  const[pRes,sRes,mRes,secRes]=await Promise.all([
    sb.from('projects').select('*').order('area').order('sort_order'),
    sb.from('subtasks').select('*').order('sort_order'),
    sb.from('milestones').select('*').order('due_date'),
    sb.from('gantt_sections').select('*').order('sort_order'),
  ]);
  if(pRes.error){showToast('Errore: '+pRes.error.message,'error');return}
  allProjects=pRes.data||[];allSubtasks=sRes.data||[];allMilestones=mRes.data||[];
  // gantt_sections può non esistere ancora (migration non eseguita): degrada senza bloccare
  allSections=secRes&&!secRes.error?(secRes.data||[]):[];
  const areas=orderedAreaNames();
  areas.forEach(a=>{if(expandedAreas[a]===undefined)expandedAreas[a]=true});
  updateKPIs();renderGantt();
}

// ── KPIs ──────────────────────────────────────────────────────
function updateKPIs(){
  const total=allProjects.length;
  const active=allProjects.filter(p=>p.status==='in_corso').length;
  const done=allProjects.filter(p=>p.status==='completato').length;
  const susp=allProjects.filter(p=>p.status==='sospeso').length;
  const avgProg=total?Math.round(allProjects.reduce((s,p)=>s+(p.progress_pct||0),0)/total):0;
  document.getElementById('kpi-total').textContent=total;
  document.getElementById('kpi-active').textContent=active;
  document.getElementById('kpi-active-sub').textContent=total?`${Math.round(active/total*100)}% del totale`:'';
  document.getElementById('kpi-done').textContent=done;
  document.getElementById('kpi-suspended').textContent=susp;
  document.getElementById('kpi-progress').textContent=avgProg+'%';
  document.getElementById('kpi-bar-active').style.width=(total?active/total*100:0)+'%';
  document.getElementById('kpi-bar-done').style.width=(total?done/total*100:0)+'%';
  document.getElementById('kpi-bar-susp').style.width=(total?susp/total*100:0)+'%';
  document.getElementById('kpi-bar-prog').style.width=avgProg+'%';
}

function setKpiFilter(status){
  // toggle: click again to deactivate
  if(activeKpiFilter===status){activeKpiFilter='all';}else{activeKpiFilter=status;}
  // sync with status dropdown
  if(activeKpiFilter==='all'){
    activeStatusFilter='all';
    document.getElementById('status-filter') && (document.getElementById('status-filter').value='all');
  } else {
    activeStatusFilter=activeKpiFilter;
    document.getElementById('status-filter') && (document.getElementById('status-filter').value=activeKpiFilter);
  }
  // update card highlight
  ['all','in_corso','completato','sospeso','pianificato'].forEach(s=>{
    const card=document.getElementById('kpi-card-'+s);
    if(card) card.classList.toggle('kpi-active-filter', activeKpiFilter===s);
  });
  // 'all' card highlight
  const allCard=document.getElementById('kpi-card-all');
  if(allCard) allCard.classList.toggle('kpi-active-filter', activeKpiFilter==='all');
  renderGantt();
}

// ── FILTERS ───────────────────────────────────────────────────
function setAreaFilter(btn){
  activeAreaFilter=btn.dataset.area;
  renderAreaChips();
  renderGantt();
}
function applyFilters(){
  activeStatusFilter=document.getElementById('status-filter').value;
  activeKpiFilter=activeStatusFilter;
  renderGantt();
}
function setZoom(z){
  ['year','half','full'].forEach(id=>{
    const el=document.getElementById('zoom-'+id);
    if(el){el.style.color='';el.style.borderColor=''}
  });
  const a=document.getElementById('zoom-'+z);
  if(a){a.style.color='var(--accent)';a.style.borderColor='var(--accent)'}
  currentZoom=z;renderGantt();
}

// ── GANTT ─────────────────────────────────────────────────────
function renderGantt(){
  renderAreaChips();
  const today=new Date();
  let tStart,tEnd;
  if(currentZoom==='full'){tStart=PROGRAM_START;tEnd=PROGRAM_END}
  else if(currentZoom==='half'){tStart=new Date(today.getFullYear(),today.getMonth()-1,1);tEnd=new Date(today.getFullYear(),today.getMonth()+5,0)}
  else{tStart=new Date(today.getFullYear(),0,1);tEnd=new Date(today.getFullYear(),11,31)}

  const months=[];
  let cur=new Date(tStart.getFullYear(),tStart.getMonth(),1);
  while(cur<=tEnd){months.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1)}

  const isMobile=window.innerWidth<=768;
  const COL_W=currentZoom==='full'?(isMobile?38:52):currentZoom==='half'?(isMobile?80:110):(isMobile?55:80);
  const totalW=months.length*COL_W;
  const sidebarW=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'))||290;

  function dateToX(date){
    const d=new Date(date);
    return Math.max(0,((d-tStart)/(tEnd-tStart))*totalW);
  }
  function dateRangeToBar(start,end){
    const x1=dateToX(new Date(start));
    const e=new Date(end);
    const x2=Math.min(dateToX(new Date(e.getFullYear(),e.getMonth()+1,0)),totalW);
    return{left:x1,width:Math.max(x2-x1,4)};
  }

  const effectiveStatusFilter = activeKpiFilter !== 'all' ? activeKpiFilter : activeStatusFilter;

  const filtered=allProjects.filter(p=>{
    if(activeAreaFilter!=='all'&&p.area!==activeAreaFilter&&
      !(activeAreaFilter==='Controllo Qualita'&&p.area==='Controllo Qualità'))return false;
    if(effectiveStatusFilter!=='all'&&p.status!==effectiveStatusFilter)return false;
    return true;
  });

  const allAreas=orderedAreaNames();
  const isAdmin=currentRole==='admin';
  const mNames=['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];

  let html=`<div style="display:flex;flex-direction:column;min-width:${totalW+sidebarW}px">`;

  // header months
  html+=`<div style="display:flex;position:sticky;top:0;z-index:20;background:var(--bg3);border-bottom:1px solid var(--border)">`;
  html+=`<div style="width:${sidebarW}px;flex-shrink:0;border-right:1px solid var(--border);height:var(--gantt-header-h,50px);display:flex;align-items:center;padding:0 14px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)">Progetto</div>`;
  html+=`<div style="display:flex;flex:1">`;
  months.forEach(m=>{
    const isCur=m.getFullYear()===today.getFullYear()&&m.getMonth()===today.getMonth();
    html+=`<div style="width:${COL_W}px;flex-shrink:0;height:var(--gantt-header-h,50px);display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);font-size:10px;font-weight:600;${isCur?'background:rgba(43,94,167,.12)':''}"><span style="color:var(--text2)">${mNames[m.getMonth()]}</span><span style="font-size:9px;color:var(--text4)">${m.getFullYear()}</span></div>`;
  });
  html+=`</div></div>`;

  allAreas.forEach((area,areaIdx)=>{
    const areaProjects=filtered.filter(p=>p.area===area).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
    // con filtro stato attivo nascondo le sezioni senza progetti corrispondenti
    if(areaProjects.length===0&&effectiveStatusFilter!=='all')return;
    const color=AREA_COLORS(area);
    const isExp=expandedAreas[area]!==false;
    const areaCount=allProjects.filter(p=>p.area===area).length;
    const areaEsc=area.replace(/'/g,"\\'");
    const isFirst=areaIdx===0;
    const isLast=areaIdx===allAreas.length-1;

    html+=`<div class="gantt-area-header" data-area="${escHtml(area)}" style="display:flex;border-bottom:1px solid var(--border);background:var(--bg3)"
      ${isAdmin?`ondragover="onSectionOrProjDragOver(event,'${areaEsc}')" ondrop="onSectionOrProjDrop(event,'${areaEsc}')"`:''}>
      <div style="width:${sidebarW}px;flex-shrink:0;border-right:1px solid var(--border);height:30px;display:flex;align-items:center;gap:7px;padding:0 10px 0 ${isAdmin?'8':'14'}px;cursor:pointer;position:sticky;left:0;z-index:5;background:var(--bg3)" onclick="toggleArea('${areaEsc}')">
        ${isAdmin?`<span class="sec-drag-handle" draggable="true" title="Trascina per riordinare la sezione" onclick="event.stopPropagation()" ondragstart="onSectionDragStart(event,'${areaEsc}')" ondragend="onSectionDragEnd(event)" style="cursor:grab;color:var(--text4);font-size:12px;line-height:1;user-select:none">&#x2807;</span>`:''}
        <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <span style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:${color}">${escHtml(area)}</span>
        <span style="font-size:10px;color:var(--text4)">${areaCount}</span>
        ${isAdmin?`
        <span style="display:inline-flex;gap:1px;margin-left:4px">
          <button class="sec-move-btn" title="Sposta su" onclick="event.stopPropagation();moveSection('${areaEsc}',-1)" ${isFirst?'disabled':''} style="border:none;background:none;cursor:${isFirst?'default':'pointer'};color:var(--text${isFirst?'4':'3'});font-size:10px;line-height:1;padding:0 1px">&#9650;</button>
          <button class="sec-move-btn" title="Sposta giù" onclick="event.stopPropagation();moveSection('${areaEsc}',1)" ${isLast?'disabled':''} style="border:none;background:none;cursor:${isLast?'default':'pointer'};color:var(--text${isLast?'4':'3'});font-size:10px;line-height:1;padding:0 1px">&#9660;</button>
        </span>
        <button class="area-add-btn" title="Nuovo progetto in ${escHtml(area)}" onclick="event.stopPropagation();openNewProjectModal('${areaEsc}')" style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:13px;line-height:1;padding:0 2px">+</button>`:''}
        <span style="margin-left:auto;font-size:10px;color:var(--text3);transition:transform .2s;display:inline-block;transform:rotate(${isExp?0:-90}deg)">&#9660;</span>
      </div>
      <div style="flex:1;height:30px;background:${color}10"></div>
    </div>`;

    if(!isExp)return;

    if(areaProjects.length===0){
      html+=`<div class="gantt-area-empty" ${isAdmin?`ondragover="onAreaDragOver(event,'${areaEsc}')" ondrop="onAreaDrop(event,'${areaEsc}')"`:''} style="display:flex;border-bottom:1px solid var(--border);height:30px">
        <div style="width:${sidebarW}px;flex-shrink:0;border-right:1px solid var(--border);display:flex;align-items:center;padding:0 18px;position:sticky;left:0;z-index:5;background:var(--bg4);font-size:11px;color:var(--text4);font-style:italic">Nessun progetto${isAdmin?' — trascina qui o usa +':''}</div>
        <div style="flex:1;background:var(--bg4)"></div>
      </div>`;
    }

    areaProjects.forEach(proj=>{
      const subtasks=allSubtasks.filter(s=>s.project_id===proj.id);
      const milestones=allMilestones.filter(m=>m.project_id===proj.id);
      const hasChildren=subtasks.length>0||milestones.length>0;
      const isExpP=expandedProjects[proj.id];
      const bar=dateRangeToBar(proj.start_date,proj.end_date);

      const ttData=JSON.stringify({
        title:proj.title,status:proj.status,area:proj.area,
        start:proj.start_date,end:proj.end_date,
        progress:proj.progress_pct||0,
        resources:proj.resources_days?proj.resources_days+' gg':'—',
        cost:proj.cost_notes||'—',
        notes:proj.notes?(proj.notes.substring(0,120)+(proj.notes.length>120?'…':'')):''
      }).replace(/"/g,'&quot;');

      html+=`<div class="gantt-project-row" data-pid="${proj.id}" data-area="${escHtml(proj.area)}"
        ${isAdmin?`draggable="true" ondragstart="onProjDragStart(event,${proj.id})" ondragend="onProjDragEnd(event)" ondragover="onProjDragOver(event,${proj.id},'${areaEsc}')" ondrop="onProjDrop(event,${proj.id},'${areaEsc}')"`:''}
        style="display:flex;border-bottom:1px solid var(--border);height:var(--gantt-row-h);transition:background .15s" onmouseenter="this.style.background='rgba(43,94,167,.05)'" onmouseleave="this.style.background=''">
        <div style="width:${sidebarW}px;flex-shrink:0;border-right:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 10px 0 ${isAdmin?'8':'18'}px;cursor:pointer;background:var(--bg4);position:sticky;left:0;z-index:5;transition:background .15s" onclick="openProjectModal(${proj.id})" onmouseenter="this.style.background='#E8E8E8'" onmouseleave="this.style.background='var(--bg4)'">
          ${isAdmin?`<span class="drag-handle" title="Trascina per spostare/riordinare" onclick="event.stopPropagation()" style="cursor:grab;color:var(--text4);font-size:12px;line-height:1;user-select:none">&#x2807;</span>`:''}
          <button class="project-expand-btn ${hasChildren?'':'no-children'}" id="proj-exp-${proj.id}" onclick="event.stopPropagation();toggleProject(${proj.id})">${isExpP?'&#9660;':'&#9658;'}</button>
          <div class="project-status-dot status-${proj.status}"></div>
          <div class="project-name" title="${escHtml(proj.title)}">${escHtml(proj.title)}</div>
        </div>
        <div style="flex:1;position:relative;min-width:${totalW}px;display:flex;align-items:center;background:var(--bg4)">
          ${months.map((m,i)=>`<div style="position:absolute;left:${i*COL_W}px;top:0;bottom:0;width:1px;background:var(--border)"></div>`).join('')}
          <div class="gantt-bar" style="left:${bar.left}px;width:${bar.width}px;background:${color};border:none" data-tooltip="${ttData}" onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()" onclick="openProjectModal(${proj.id})">
            <div class="gantt-bar-progress" style="width:${proj.progress_pct||0}%"></div>
            <span class="gantt-bar-label">${escHtml(proj.title)}</span>
          </div>
          ${milestones.map(mi=>{
            const mx=dateToX(new Date(mi.due_date));
            return `<div class="gantt-milestone ${mi.completed?'milestone-done':'milestone-pending'}" style="left:${mx}px;top:50%;margin-top:-4px" title="${escHtml(mi.title)} - ${formatDate(mi.due_date)}"></div>`;
          }).join('')}
        </div>
      </div>`;

      if(isExpP){
        subtasks.forEach(st=>{
          const sb2=dateRangeToBar(st.start_date,st.end_date);
          html+=`<div style="display:flex;border-bottom:1px solid rgba(175,175,175,.4);height:28px;background:#DADADA">
            <div style="width:${sidebarW}px;flex-shrink:0;border-right:1px solid var(--border);display:flex;align-items:center;gap:7px;padding:0 10px 0 32px;position:sticky;left:0;z-index:5;background:#DADADA">
              <div class="project-status-dot status-${st.status}" style="width:5px;height:5px"></div>
              <div style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1" title="${escHtml(st.title)}">${escHtml(st.title)}</div>
            </div>
            <div style="flex:1;position:relative;min-width:${totalW}px;display:flex;align-items:center;background:#DADADA">
              ${months.map((m,i)=>`<div style="position:absolute;left:${i*COL_W}px;top:0;bottom:0;width:1px;background:var(--border);opacity:.5"></div>`).join('')}
              <div style="position:absolute;left:${sb2.left}px;width:${sb2.width}px;height:12px;border-radius:3px;background:${color}88;top:50%;margin-top:-6px"></div>
            </div>
          </div>`;
        });
      }
    });
  });

  html+='</div>';
  document.getElementById('gantt-inner').innerHTML=html;
  updateTodayLine(dateToX(today),sidebarW);
  const sc=document.getElementById('gantt-scroll-container');
  if(sc)sc.onscroll=()=>updateTodayLine(dateToX(today),sidebarW);
  window.onresize=()=>renderGantt();
}

function updateTodayLine(todayX,sidebarW){
  const line=document.getElementById('gantt-today-line');
  if(!line)return;
  const sc=document.getElementById('gantt-scroll-container');
  const scrollLeft=sc?sc.scrollLeft:0;
  const wrapper=document.getElementById('gantt-wrapper');
  if(!wrapper)return;
  const rect=wrapper.getBoundingClientRect();
  const xInTimeline=sidebarW+todayX-scrollLeft;
  const absX=rect.left+xInTimeline;
  line.style.left=absX+'px';
  line.style.display=(xInTimeline<sidebarW||xInTimeline>rect.width)?'none':'block';
}

function renderAreaChips(){
  const wrap=document.getElementById('area-chips');
  if(!wrap)return;
  let h=`<button class="filter-chip ${activeAreaFilter==='all'?'active':''}" data-area="all" onclick="setAreaFilter(this)">Tutte</button>`;
  orderedAreaNames().forEach(a=>{
    const col=AREA_COLORS(a);
    const act=activeAreaFilter===a?'active':'';
    h+=`<button class="filter-chip ${act}" data-area="${escHtml(a)}" onclick="setAreaFilter(this)" style="${act?`background:${col};border-color:${col};color:#fff`:''}">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${col};margin-right:5px;vertical-align:middle"></span>${escHtml(a)}</button>`;
  });
  wrap.innerHTML=h;
}
function toggleArea(area){expandedAreas[area]=!expandedAreas[area];renderGantt()}

// DRAG & DROP PROGETTI (riordino + spostamento tra sezioni)
// ══════════════════════════════════════════════════════════════
function onProjDragStart(e,pid){
  dragProjectId=pid;
  dragSectionName=null;
  e.dataTransfer.effectAllowed='move';
  try{e.dataTransfer.setData('text/plain',String(pid))}catch(_){}
  const row=e.currentTarget;row.classList.add('dragging');
}
function onProjDragEnd(e){
  dragProjectId=null;
  document.querySelectorAll('.gantt-project-row').forEach(r=>r.classList.remove('dragging','drop-above','drop-below'));
  document.querySelectorAll('.gantt-area-header,.gantt-area-empty').forEach(r=>r.classList.remove('drop-target'));
}
function onProjDragOver(e,targetPid,area){
  if(dragProjectId===null||dragProjectId===targetPid)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const row=e.currentTarget;
  const rect=row.getBoundingClientRect();
  const below=(e.clientY-rect.top)>rect.height/2;
  document.querySelectorAll('.gantt-project-row').forEach(r=>r.classList.remove('drop-above','drop-below'));
  row.classList.add(below?'drop-below':'drop-above');
}
function onAreaDragOver(e,area){
  if(dragProjectId===null)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drop-target');
}
function clearDragMarkers(){
  document.querySelectorAll('.gantt-project-row').forEach(r=>r.classList.remove('drop-above','drop-below'));
  document.querySelectorAll('.gantt-area-header,.gantt-area-empty').forEach(r=>r.classList.remove('drop-target'));
}
document.addEventListener('dragleave',e=>{
  if(e.target.classList&&(e.target.classList.contains('gantt-area-header')||e.target.classList.contains('gantt-area-empty')))
    e.target.classList.remove('drop-target');
});

// Drop su una RIGA progetto: inserisce sopra/sotto quel progetto, nella sua sezione
async function onProjDrop(e,targetPid,area){
  e.preventDefault();e.stopPropagation();
  const dragged=dragProjectId;
  if(dragged===null||dragged===targetPid){clearDragMarkers();return}
  const rect=e.currentTarget.getBoundingClientRect();
  const below=(e.clientY-rect.top)>rect.height/2;
  clearDragMarkers();
  await reorderProject(dragged,area,targetPid,below);
}
// Drop sull'HEADER o zona vuota di una sezione: in coda a quella sezione
async function onAreaDrop(e,area){
  e.preventDefault();e.stopPropagation();
  const dragged=dragProjectId;
  clearDragMarkers();
  if(dragged===null)return;
  await reorderProject(dragged,area,null,false);
}

// ── DRAG&DROP SEZIONI (riordino intere sezioni) ───────────────
function onSectionDragStart(e,area){
  dragSectionName=area;
  dragProjectId=null; // priorità alla sezione
  e.dataTransfer.effectAllowed='move';
  try{e.dataTransfer.setData('text/plain','section:'+area)}catch(_){}
  const header=e.currentTarget.closest('.gantt-area-header');
  if(header)header.classList.add('sec-dragging');
}
function onSectionDragEnd(e){
  dragSectionName=null;
  document.querySelectorAll('.gantt-area-header').forEach(r=>r.classList.remove('sec-dragging','sec-drop-above','sec-drop-below','drop-target'));
}
// Dragover sull'header: distingue se sto trascinando una sezione o un progetto
function onSectionOrProjDragOver(e,area){
  if(dragSectionName!==null){
    if(dragSectionName===area)return;
    e.preventDefault();e.dataTransfer.dropEffect='move';
    const header=e.currentTarget;
    const rect=header.getBoundingClientRect();
    const below=(e.clientY-rect.top)>rect.height/2;
    document.querySelectorAll('.gantt-area-header').forEach(r=>r.classList.remove('sec-drop-above','sec-drop-below'));
    header.classList.add(below?'sec-drop-below':'sec-drop-above');
  }else if(dragProjectId!==null){
    onAreaDragOver(e,area);
  }
}
async function onSectionOrProjDrop(e,area){
  e.preventDefault();e.stopPropagation();
  if(dragSectionName!==null){
    const src=dragSectionName;
    const rect=e.currentTarget.getBoundingClientRect();
    const below=(e.clientY-rect.top)>rect.height/2;
    document.querySelectorAll('.gantt-area-header').forEach(r=>r.classList.remove('sec-drop-above','sec-drop-below'));
    if(src!==area)await reorderSection(src,area,below);
  }else if(dragProjectId!==null){
    await onAreaDrop(e,area);
  }
}

// Sposta una sezione su/giù di una posizione (frecce)
async function moveSection(area,dir){
  if(currentRole!=='admin')return;
  const names=orderedAreaNames();
  const i=names.indexOf(area);
  const j=i+dir;
  if(i<0||j<0||j>=names.length)return;
  await reorderSection(area, names[j], dir>0); // rilascia prima/dopo il vicino
}

// Registra in gantt_sections tutte le sezioni non ancora presenti (retrocompat storiche)
async function ensureSectionsRegistered(names){
  const missing=names.filter(n=>!allSections.find(s=>s.name===n));
  for(const nm of missing){
    const maxSort=allSections.reduce((m,s)=>Math.max(m,s.sort_order||0),0);
    const{data,error}=await sb.from('gantt_sections').insert({name:nm,color:AREA_COLORS(nm),sort_order:maxSort+1}).select().single();
    if(error)throw error;
    allSections.push(data);
  }
}

// Riordina spostando `src` immediatamente prima/dopo `anchor`, poi persiste sort_order
async function reorderSection(src,anchor,after){
  if(currentRole!=='admin')return;
  try{
    let names=orderedAreaNames();
    // assicura che tutte (incluse le storiche) siano in gantt_sections così sort_order è persistibile
    await ensureSectionsRegistered(names);
    names=names.filter(n=>n!==src);
    let idx=names.indexOf(anchor);
    if(idx<0)idx=names.length-1;
    const insertAt=after?idx+1:idx;
    names.splice(insertAt,0,src);
    // riassegna sort_order sequenziale e persisti
    for(let k=0;k<names.length;k++){
      const sec=allSections.find(s=>s.name===names[k]);
      if(!sec)continue;
      const newSort=(k+1)*10;
      if(sec.sort_order!==newSort){
        const{error}=await sb.from('gantt_sections').update({sort_order:newSort}).eq('id',sec.id);
        if(error)throw error;
        sec.sort_order=newSort;
      }
    }
    renderGantt();
    showToast('Ordine sezioni aggiornato','success');
  }catch(err){
    showToast('Errore riordino sezioni: '+(err.message||err),'error');
    await loadData();
  }
}

// Ricalcola l'ordine dei progetti nella sezione di destinazione e persiste
async function reorderProject(pid,targetArea,anchorPid,below){
  if(currentRole!=='admin')return;
  const moved=allProjects.find(p=>p.id===pid);
  if(!moved)return;
  const oldArea=moved.area;
  // lista destinazione (esclude il progetto mosso), ordinata
  let destList=allProjects.filter(p=>p.area===targetArea&&p.id!==pid).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  // calcola indice di inserimento
  let insertIdx=destList.length;
  if(anchorPid!==null){
    const ai=destList.findIndex(p=>p.id===anchorPid);
    if(ai>=0)insertIdx=below?ai+1:ai;
  }
  moved.area=targetArea;
  destList.splice(insertIdx,0,moved);
  // riassegna sort_order sequenziale
  const updates=destList.map((p,i)=>({id:p.id,sort_order:(i+1)*10}));
  // aggiorna modello locale
  updates.forEach(u=>{const p=allProjects.find(x=>x.id===u.id);if(p)p.sort_order=u.sort_order});
  // persisti su Supabase (aggiorno area del mosso + sort_order di tutta la sezione dest)
  try{
    const{error:e1}=await sb.from('projects').update({area:targetArea,updated_at:new Date().toISOString()}).eq('id',pid);
    if(e1)throw e1;
    for(const u of updates){
      const{error:e2}=await sb.from('projects').update({sort_order:u.sort_order}).eq('id',u.id);
      if(e2)throw e2;
    }
    await sb.from('audit_log').insert({user_id:currentUser.id,table_name:'projects',record_id:pid,action:'UPDATE',new_data:{area:targetArea,reordered:true}});
    if(oldArea!==targetArea)showToast(`Spostato in "${targetArea}"`,'success');
    else showToast('Ordine aggiornato','success');
  }catch(err){
    showToast('Errore riordino: '+(err.message||err),'error');
    await loadData();return;
  }
  updateKPIs();renderGantt();
}

function nextSectionColor(){
  const used=new Set(allSections.map(s=>(s.color||'').toLowerCase()));
  const free=SECTION_PALETTE.find(c=>!used.has(c.toLowerCase()));
  return free||SECTION_PALETTE[0];
}
async function createSection(){
  if(currentRole!=='admin')return;
  const name=prompt('Nome della nuova sezione:');
  if(name===null)return;
  const nm=name.trim();
  if(!nm){showToast('Nome non valido','error');return}
  if(orderedAreaNames().includes(nm)){showToast('Sezione già esistente','error');return}
  const proposed=nextSectionColor();
  let color=prompt(`Colore esadecimale (proposto: ${proposed}):`,proposed);
  if(color===null)return;
  color=color.trim();
  if(!/^#[0-9A-Fa-f]{6}$/.test(color))color=proposed;
  const maxSort=allSections.reduce((m,s)=>Math.max(m,s.sort_order||0),0);
  const{data,error}=await sb.from('gantt_sections').insert({name:nm,color,sort_order:maxSort+1}).select().single();
  if(error){showToast('Errore: '+error.message,'error');return}
  allSections.push(data);
  expandedAreas[nm]=true;
  renderGantt();
  showToast(`Sezione "${nm}" creata`,'success');
}
function pickSection(promptMsg){
  const names=orderedAreaNames();
  if(names.length===0){showToast('Nessuna sezione','error');return null}
  const listed=names.map((n,i)=>`${i+1}. ${n}`).join('\n');
  const ans=prompt(`${promptMsg}\n\n${listed}\n\nInserisci il numero:`);
  if(ans===null)return null;
  const idx=parseInt(ans,10)-1;
  if(isNaN(idx)||idx<0||idx>=names.length){showToast('Selezione non valida','error');return null}
  return names[idx];
}
async function renameSection(){
  if(currentRole!=='admin')return;
  const oldName=pickSection('Quale sezione vuoi rinominare?');
  if(!oldName)return;
  const nn=prompt(`Nuovo nome per "${oldName}":`,oldName);
  if(nn===null)return;
  const newName=nn.trim();
  if(!newName){showToast('Nome non valido','error');return}
  if(newName===oldName)return;
  if(orderedAreaNames().includes(newName)){showToast('Nome già in uso','error');return}
  try{
    const sec=allSections.find(s=>s.name===oldName);
    if(sec){
      const{error:e1}=await sb.from('gantt_sections').update({name:newName}).eq('id',sec.id);
      if(e1)throw e1;
      sec.name=newName;
    }else{
      // sezione storica non ancora in gantt_sections: la registro col nuovo nome
      const maxSort=allSections.reduce((m,s)=>Math.max(m,s.sort_order||0),0);
      const{data,error:eIns}=await sb.from('gantt_sections').insert({name:newName,color:AREA_COLORS(oldName),sort_order:maxSort+1}).select().single();
      if(eIns)throw eIns;
      allSections.push(data);
    }
    // cascata sui progetti
    const{error:e2}=await sb.from('projects').update({area:newName}).eq('area',oldName);
    if(e2)throw e2;
    allProjects.forEach(p=>{if(p.area===oldName)p.area=newName});
    if(expandedAreas[oldName]!==undefined){expandedAreas[newName]=expandedAreas[oldName];delete expandedAreas[oldName]}
    renderGantt();updateKPIs();
    showToast('Sezione rinominata','success');
  }catch(err){showToast('Errore: '+(err.message||err),'error');await loadData()}
}
async function recolorSection(){
  if(currentRole!=='admin')return;
  const name=pickSection('Di quale sezione vuoi cambiare il colore?');
  if(!name)return;
  const cur=AREA_COLORS(name);
  let color=prompt(`Nuovo colore esadecimale per "${name}" (attuale ${cur}):`,cur);
  if(color===null)return;
  color=color.trim();
  if(!/^#[0-9A-Fa-f]{6}$/.test(color)){showToast('Colore non valido (usa #RRGGBB)','error');return}
  try{
    const sec=allSections.find(s=>s.name===name);
    if(sec){
      const{error}=await sb.from('gantt_sections').update({color}).eq('id',sec.id);
      if(error)throw error;
      sec.color=color;
    }else{
      const maxSort=allSections.reduce((m,s)=>Math.max(m,s.sort_order||0),0);
      const{data,error}=await sb.from('gantt_sections').insert({name,color,sort_order:maxSort+1}).select().single();
      if(error)throw error;
      allSections.push(data);
    }
    renderGantt();
    showToast('Colore aggiornato','success');
  }catch(err){showToast('Errore: '+(err.message||err),'error')}
}
async function removeSection(){
  if(currentRole!=='admin')return;
  const name=pickSection('Quale sezione vuoi rimuovere?');
  if(!name)return;
  const count=allProjects.filter(p=>p.area===name).length;
  if(count>0){showToast(`"${name}" contiene ${count} progetti: spostali prima di rimuoverla`,'error');return}
  if(!confirm(`Rimuovere la sezione "${name}"?`))return;
  const sec=allSections.find(s=>s.name===name);
  if(!sec){showToast('Sezione non registrata: nulla da rimuovere','error');return}
  const{error}=await sb.from('gantt_sections').delete().eq('id',sec.id);
  if(error){showToast('Errore: '+error.message,'error');return}
  allSections=allSections.filter(s=>s.id!==sec.id);
  delete expandedAreas[name];
  renderGantt();
  showToast('Sezione rimossa','success');
}

async function duplicateProject(sourceId){
  if(currentRole!=='admin')return;
  const src=allProjects.find(p=>p.id===sourceId);
  if(!src)return;
  const nt=prompt('Titolo del nuovo progetto (copia):',src.title+' (copia)');
  if(nt===null)return;
  const title=nt.trim();
  if(!title){showToast('Titolo non valido','error');return}
  const copyMs=confirm('Copiare anche le milestone del progetto originale?\n\nOK = sì   ·   Annulla = no');
  const maxSort=allProjects.filter(p=>p.area===src.area).reduce((m,p)=>Math.max(m,p.sort_order||0),0);
  // copio i campi rilevanti, azzerando avanzamento/note operative
  const newRow={
    title,area:src.area,status:'pianificato',
    start_date:src.start_date,end_date:src.end_date,
    description:src.description||null,
    resources_days:src.resources_days??null,resources_people:src.resources_people??null,
    cost_notes:src.cost_notes||null,
    progress_pct:0,notes:null,sort_order:maxSort+10
  };
  const{data:np,error}=await sb.from('projects').insert(newRow).select().single();
  if(error){showToast('Errore: '+error.message,'error');return}
  allProjects.push(np);
  if(copyMs){
    const srcMs=allMilestones.filter(m=>m.project_id===sourceId);
    if(srcMs.length){
      const rows=srcMs.map(m=>({project_id:np.id,title:m.title,due_date:m.due_date,completed:m.completed,completed_at:m.completed?m.completed_at:null}));
      const{data:insMs,error:eMs}=await sb.from('milestones').insert(rows).select();
      if(eMs){showToast('Progetto creato, ma errore copia milestone: '+eMs.message,'error');}
      else if(insMs)allMilestones.push(...insMs);
    }
  }
  await sb.from('audit_log').insert({user_id:currentUser.id,table_name:'projects',record_id:np.id,action:'INSERT',new_data:{duplicated_from:sourceId,title}});
  closeModal();updateKPIs();renderGantt();
  showToast('Progetto duplicato','success');
  openProjectModal(np.id);
}
async function deleteProject(id){
  if(currentRole!=='admin')return;
  const proj=allProjects.find(p=>p.id===id);
  if(!proj)return;
  const nSub=allSubtasks.filter(s=>s.project_id===id).length;
  const nMs=allMilestones.filter(m=>m.project_id===id).length;
  if(!confirm(`Eliminare "${proj.title}"?\n\nVerranno eliminati anche ${nSub} sotto-attività e ${nMs} milestone collegate.\n\nOperazione non reversibile.`))return;
  try{
    if(nSub){const{error:e1}=await sb.from('subtasks').delete().eq('project_id',id);if(e1)throw e1}
    if(nMs){const{error:e2}=await sb.from('milestones').delete().eq('project_id',id);if(e2)throw e2}
    const{error:e3}=await sb.from('projects').delete().eq('id',id);if(e3)throw e3;
    allSubtasks=allSubtasks.filter(s=>s.project_id!==id);
    allMilestones=allMilestones.filter(m=>m.project_id!==id);
    allProjects=allProjects.filter(p=>p.id!==id);
    await sb.from('audit_log').insert({user_id:currentUser.id,table_name:'projects',record_id:id,action:'DELETE',new_data:{title:proj.title}});
    closeModal();updateKPIs();renderGantt();
    showToast('Progetto eliminato','success');
  }catch(err){showToast('Errore: '+(err.message||err),'error');await loadData()}
}

      <div style="text-align:right;font-size:10px;color:var(--text3);margin-top:3px">${d.progress}% completato</div>`;

}
function hideTooltip(){tooltip.style.display='none'}
function positionTooltip(e){
  const tw=tooltip.offsetWidth||280,th=tooltip.offsetHeight||160;
  let x=e.clientX+14,y=e.clientY-10;
  if(x+tw>window.innerWidth-20)x=e.clientX-tw-14;
  if(y+th>window.innerHeight-20)y=e.clientY-th;
  tooltip.style.left=x+'px';tooltip.style.top=y+'px';
}
document.addEventListener('mousemove',e=>{if(tooltip.style.display==='block')positionTooltip(e)});

// ── SAVE PROJECT ──────────────────────────────────────────────
async function saveProject(id){
  if(currentRole!=='admin')return;
  const proj=allProjects.find(p=>p.id===id);
  const title=document.getElementById('modal-title').value.trim();
  const area=document.getElementById('modal-area').value;
  const status=document.getElementById('modal-status').value;
  const start=document.getElementById('modal-start').value;
  const end=document.getElementById('modal-end').value;
  const progress=parseInt(document.getElementById('modal-progress').value)||0;
  const notes=document.getElementById('modal-notes').value;
  if(!title){showToast('Il titolo non può essere vuoto','error');return}
  const upd={title,area,status,start_date:start||null,end_date:end||null,progress_pct:progress,notes,updated_at:new Date().toISOString()};
  // se cambia sezione, mettilo in coda alla nuova
  if(proj&&area!==proj.area){
    const maxSort=allProjects.filter(p=>p.area===area&&p.id!==id).reduce((m,p)=>Math.max(m,p.sort_order||0),0);
    upd.sort_order=maxSort+10;
  }
  const{error}=await sb.from('projects').update(upd).eq('id',id);
  if(error){showToast('Errore: '+error.message,'error');return}
  const idx=allProjects.findIndex(p=>p.id===id);
  if(idx>=0)Object.assign(allProjects[idx],{title,area,status,start_date:start||null,end_date:end||null,progress_pct:progress,notes,sort_order:upd.sort_order??allProjects[idx].sort_order});
  if(area)expandedAreas[area]=true;
  await sb.from('audit_log').insert({user_id:currentUser.id,table_name:'projects',record_id:id,action:'UPDATE',new_data:{title,area,status,progress_pct:progress}});
  closeModal();updateKPIs();renderGantt();
  showToast('Progetto aggiornato','success');
}

// ── MILESTONE CRUD ────────────────────────────────────────────
async function addMilestone(projectId){
  if(currentRole!=='admin')return;
  const title=document.getElementById('new-mi-title').value.trim();
  const date=document.getElementById('new-mi-date').value;
  if(!title||!date){showToast('Inserisci descrizione e data','error');return}
  const{data,error}=await sb.from('milestones').insert({project_id:projectId,title,due_date:date,completed:false}).select().single();
  if(error){showToast('Errore: '+error.message,'error');return}
  allMilestones.push(data);
  // refresh milestone list in modal without closing
  const milestones=allMilestones.filter(m=>m.project_id===projectId);
  document.getElementById('milestone-list').innerHTML=renderMilestoneList(milestones,true);
  document.getElementById('new-mi-title').value='';
  document.getElementById('new-mi-date').value='';
  renderGantt();
  showToast('Milestone aggiunta','success');
}

async function toggleMilestone(milestoneId,completed){
  if(currentRole!=='admin')return;
  const{error}=await sb.from('milestones').update({completed,completed_at:completed?new Date().toISOString():null}).eq('id',milestoneId);
  if(error){showToast('Errore: '+error.message,'error');return}
  const idx=allMilestones.findIndex(m=>m.id===milestoneId);
  if(idx>=0)allMilestones[idx].completed=completed;
  const ms=allMilestones.find(m=>m.id===milestoneId);
  if(ms){
    const milestones=allMilestones.filter(m=>m.project_id===ms.project_id);
    document.getElementById('milestone-list').innerHTML=renderMilestoneList(milestones,true);
  }
  renderGantt();
  showToast(completed?'Milestone completata':'Milestone riaperta','success');
}

async function deleteMilestone(milestoneId){
  if(currentRole!=='admin')return;
  if(!confirm('Eliminare questa milestone?'))return;
  const ms=allMilestones.find(m=>m.id===milestoneId);
  const{error}=await sb.from('milestones').delete().eq('id',milestoneId);
  if(error){showToast('Errore: '+error.message,'error');return}
  allMilestones=allMilestones.filter(m=>m.id!==milestoneId);
  if(ms){
    const milestones=allMilestones.filter(m=>m.project_id===ms.project_id);
    document.getElementById('milestone-list').innerHTML=renderMilestoneList(milestones,true);
  }
  renderGantt();
  showToast('Milestone eliminata','success');
}
